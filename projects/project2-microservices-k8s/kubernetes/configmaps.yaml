apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: microservices
data:
  APP_ENV: "production"
  LOG_LEVEL: "info"
  ENABLE_METRICS: "true"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: user-service-config
  namespace: microservices
data:
  SERVICE_NAME: "user-service"
  SERVICE_PORT: "5000"
  REPLICAS: "3"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: order-service-config
  namespace: microservices
data:
  SERVICE_NAME: "order-service"
  SERVICE_PORT: "5001"
  REPLICAS: "3"
  USER_SERVICE_URL: "http://user-service:8000"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: payment-service-config
  namespace: microservices
data:
  SERVICE_NAME: "payment-service"
  SERVICE_PORT: "5002"
  REPLICAS: "3"
  ORDER_SERVICE_URL: "http://order-service:8000"
