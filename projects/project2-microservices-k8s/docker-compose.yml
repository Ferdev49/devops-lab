version: '3.8'

services:
  user-service:
    build:
      context: services/user-service
      dockerfile: Dockerfile
    container_name: user-service
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
    networks:
      - microservices-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  order-service:
    build:
      context: services/order-service
      dockerfile: Dockerfile
    container_name: order-service
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
    networks:
      - microservices-net
    depends_on:
      - user-service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  payment-service:
    build:
      context: services/payment-service
      dockerfile: Dockerfile
    container_name: payment-service
    ports:
      - "5002:5002"
    environment:
      - PORT=5002
    networks:
      - microservices-net
    depends_on:
      - order-service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  microservices-net:
    driver: bridge
