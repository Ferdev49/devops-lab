services:
  # SERVICE 1: Web Application
  web:
    build: .
    container_name: my-web-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      - redis
    networks:
      - app-network
    restart: unless-stopped

  # SERVICE 2: Redis Cache
  redis:
    image: redis:7-alpine
    container_name: my-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - app-network
    restart: unless-stopped
    command: redis-server --appendonly yes

# Named volumes
volumes:
  redis-data:

# Networks
networks:
  app-network:
    driver: bridge