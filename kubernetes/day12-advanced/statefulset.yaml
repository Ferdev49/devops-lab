apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: devops-lab-db
  namespace: devops-lab
spec:
  serviceName: devops-lab-db-service
  replicas: 3
  selector:
    matchLabels:
      app: devops-lab-db
  template:
    metadata:
      labels:
        app: devops-lab-db
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
          name: postgres
        env:
        - name: POSTGRES_DB
          value: "devopslab"
        - name: POSTGRES_USER
          valueFrom:
            configMapKeyRef:
              name: db-config
              key: db_user
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
  - metadata:
      name: postgres-storage
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: fast-storage
      resources:
        requests:
          storage: 10Gi
