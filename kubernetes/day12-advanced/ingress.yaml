apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: devops-lab-ingress
  namespace: devops-lab
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
  - host: devops-lab.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: devops-lab-service
            port:
              number: 80
  - host: api.devops-lab.example.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: devops-lab-api
            port:
              number: 3000
