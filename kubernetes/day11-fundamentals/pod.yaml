apiVersion: v1
kind: Pod
metadata:
  name: devops-lab-pod
  namespace: default
  labels:
    app: devops-lab
    day: "11"
spec:
  containers:
  - name: app
    image: node:18-alpine
    ports:
    - containerPort: 3000
    resources:
      requests:
        memory: "64Mi"
        cpu: "250m"
      limits:
        memory: "128Mi"
        cpu: "500m"
